name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VDI_HOST }}
          username: ${{ secrets.VDI_USER }}
          key: ${{ secrets.VDI_SSH_KEY }}
          port: ${{ secrets.VDI_PORT }}
          script: |
            set -e

            cd /opt/skybreaker

            git fetch origin main
            git reset --hard origin/main

            /home/deploy/.local/bin/poetry --version
            /home/deploy/.local/bin/poetry run python --version
            /home/deploy/.local/bin/poetry install --no-interaction --no-root

            /home/deploy/.local/bin/poetry run python manage.py migrate --noinput
            /home/deploy/.local/bin/poetry run python manage.py collectstatic --noinput

            sudo systemctl restart skybreaker
