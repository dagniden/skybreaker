{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}

    <form method="post" class="app-form">
      {% csrf_token %}
      {{ form.as_div }}

    <a class="secondary-link" href="{% url 'users:signup' %}">Создать аккаунт</a>
  </section>
{% endblock %}
